version: "3.9"

# DataSync - Unified Market Data Layer

networks:
  datasync-net:
    driver: bridge

volumes:
  timescale_data:
  redis_data:
  kafka_data:
  prometheus_data:

services:
  # TimescaleDB (PostgreSQL + time-series extension)
  timescaledb:
    image: timescale/timescaledb:latest-pg15
    container_name: datasync-timescaledb
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-datasync}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-datasync_secret}
      POSTGRES_DB: ${POSTGRES_DB:-datasync}
    volumes:
      - timescale_data:/var/lib/postgresql/data
      - ./infra/timescaledb/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - datasync-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U datasync"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis (caching layer)
  redis:
    image: redis:7-alpine
    container_name: datasync-redis
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - datasync-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Zookeeper
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: datasync-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - datasync-net

  # Kafka
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: datasync-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - datasync-net
    healthcheck:
      test:
        [
          "CMD",
          "kafka-broker-api-versions",
          "--bootstrap-server",
          "localhost:9092",
        ]
      interval: 15s
      timeout: 10s
      retries: 5

  # Kafka topic initializer
  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    container_name: datasync-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: |
      "kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --topic market.ticks.equities --partitions 4 --replication-factor 1 &&
       kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --topic market.ticks.crypto --partitions 4 --replication-factor 1 &&
       kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --topic market.ticks.options --partitions 2 --replication-factor 1 &&
       kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --topic datasync.alt-data --partitions 2 --replication-factor 1 &&
       echo Topics created"
    networks:
      - datasync-net
    restart: "no"

  # Prometheus
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: datasync-prometheus
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - datasync-net

  # REST API
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: datasync-api
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - datasync-net
    restart: unless-stopped

  # Ingest service (WebSocket feeds from Alpaca + Polygon)
  ingest:
    build:
      context: ./ingest
      dockerfile: Dockerfile
    container_name: datasync-ingest
    env_file: .env
    depends_on:
      kafka:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    networks:
      - datasync-net
    restart: unless-stopped

  # Alt-data pipeline (news, social, on-chain)
  alt-data:
    build:
      context: ./alt-data
      dockerfile: Dockerfile
    container_name: datasync-alt-data
    env_file: .env
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - datasync-net
    restart: unless-stopped
